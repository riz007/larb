# Larb configuration (declarative, NON-executable).
#
# Two locations are read:
#   ~/.larb/config.toml          fully trusted (yours)
#   <project>/.larb/config.toml  PROPOSALS ONLY — repo config can suggest models
#                                and verification commands and can only *lower*
#                                spend limits. It can never set baseURL, choose
#                                the key env var, add allow-rules, or run code.

[provider]
# `kind` selects a built-in provider preset. Each preset supplies a default
# base URL, key env var, models, and pricing — all overridable below (trusted
# config only). Known presets:
#
#   anthropic   key: ANTHROPIC_API_KEY    (Claude)
#   openai      key: OPENAI_API_KEY       (GPT)
#   ollama      no key — local, no spend
#   deepseek    key: DEEPSEEK_API_KEY
#   gemini      key: GEMINI_API_KEY       (Google)
#   groq        key: GROQ_API_KEY
#   mistral     key: MISTRAL_API_KEY
#   xai         key: XAI_API_KEY          (Grok)
#   openrouter  key: OPENROUTER_API_KEY   (many models, one key)
#   together    key: TOGETHER_API_KEY
#   perplexity  key: PERPLEXITY_API_KEY
kind = "anthropic"
# apiKeyEnv = "ANTHROPIC_API_KEY"   # override the preset's key env var
# baseURL = "https://api.anthropic.com"   # global config only; point any
                                          # OpenAI-/Anthropic-compatible endpoint here

# Routing policy: the strong model orchestrates; the cheap/fast worker model is
# used for delegated subtasks and context compaction. Omit to use the preset's
# defaults.
[provider.models]
orchestrator = "claude-opus-4-8"
worker = "claude-haiku-4-5-20251001"
# For OpenAI:    orchestrator = "gpt-4o",        worker = "gpt-4o-mini"
# For DeepSeek:  orchestrator = "deepseek-chat", worker = "deepseek-chat"
# For Gemini:    orchestrator = "gemini-2.5-pro", worker = "gemini-2.5-flash"
# For Ollama (local, no key, no spend):  orchestrator = "llama3.1"

[limits]
perRun = 2.0       # USD — hard stop for one `run`
perSession = 10.0  # USD — hard stop for the process
perDay = 25.0      # USD — hard stop per calendar day

# Verification commands run after edits. Each runs in the sandbox under exec
# permission. A `run` is not "done" until these pass.
verify = ["pnpm -s typecheck", "pnpm -s test"]

maxIterations = 30

# Execution isolation. GLOBAL-CONFIG-ONLY — repo config can never weaken this.
# "auto" runs commands in a throwaway rootless container when docker/podman is
# available (project bind-mounted, host secrets withheld, networking off), and
# transparently falls back to a reduced-isolation host subprocess otherwise. The
# active level is shown at the start of every run.
[sandbox]
backend = "auto"     # "auto" | "container" | "spawn"
# runtime = "docker" # "docker" | "podman" — auto-detected if unset
# image = "node:20"  # OCI image for the container backend
network = "none"     # "none" disables egress; "allowlist" enables it (per-host
                     # gating is via the governed http_fetch tool)

# Optional global-only policy (ignored from project config):
# [policy]
# deny = [{ capability = "net", host = "example.com" }]
