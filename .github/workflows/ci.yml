name: CI

on:
  push:
    branches: [main]
  pull_request:

# GitHub sets CI=true, which lets pnpm proceed non-interactively.
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build CLI bundle
        run: pnpm build

      - name: Smoke-test the built binary
        run: |
          node packages/cli/dist/index.js version
          node packages/cli/dist/index.js providers
